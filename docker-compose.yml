version: '3.8'

services:
  api:
    build: .
    container_name: breast-cancer-ai-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEVICE=cpu  # Change to cuda if GPU available
    volumes:
      - ./models:/app/models          # Mount trained models from Colab
      - ./reports:/app/reports        # Mount generated reports
      - ./datasets:/app/datasets      # Optional: mount datasets
    restart: unless-stopped
    
  streamlit:
    build: .
    container_name: breast-cancer-ai-ui
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - DEVICE=cpu  # Change to cuda if GPU available
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./datasets:/app/datasets
    restart: unless-stopped
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

